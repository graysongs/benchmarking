# ============================================================
# 本地测试站点专用 — 验证 click_coords_expect_popup 流程
#
# 前置条件：
#   启动测试服务器：python web-gui-tester/test_server.py
#
# 流程：
#   1. 打开登录页 → 填入凭据 → 点击登录
#   2. 点击 fixed 定位的「打开汇总窗口」按钮 (top:100, left:50)
#      并自动等待弹窗出现、切换过去
#   3. 截取弹窗内容
# ============================================================
name: "本地测试站点 — 登录+弹窗截图"
description: "用 test_server.py 提供的页面验证弹窗截图流程"

vars:
  # ---------- 服务器地址 ----------
  website_url: "http://localhost:8765/index.html"

  # ---------- 弹窗按钮坐标（视口坐标） ----------
  # 按钮实际位置 top:100, left:50, 大小 ~147x39
  # 使用按钮中心坐标以确保可靠触发
  popup_btn_left: "123"
  popup_btn_top: "119"

  # ---------- 登录选择器（与 test-site HTML 一致） ----------
  username_sel: "#username"
  password_sel: "#password"
  submit_sel: "#login-btn"

steps:
  # ── 第一步：登录 ──────────────────────────────────
  - action: login
    description: "登录测试站点（任意凭据）"
    url: "{vars.website_url}"
    username_selector: "{vars.username_sel}"
    password_selector: "{vars.password_sel}"
    submit_selector: "{vars.submit_sel}"
    username: "testuser"
    password: "testpass"

  - action: screenshot
    description: "截取仪表盘页面"
    name: "dashboard"

  # ── 第二步：坐标点击 + 自动等待弹窗 ──────────────
  - action: click_coords_expect_popup
    description: "点击『打开汇总窗口』按钮，等待弹窗并切换"
    left: "{vars.popup_btn_left}"
    top: "{vars.popup_btn_top}"
    button: "open summary window"
    timeout: 15000

  # ── 第三步：截图新弹窗 ──────────────────────────
  - action: screenshot
    description: "截取弹窗页面"
    name: "popup_window"

  - action: assert_url
    description: "确认已切换到弹窗页面"
    contains: "/popup.html"
