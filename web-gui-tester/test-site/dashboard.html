<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试站点 - 仪表盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5; padding: 24px;
    }
    .header {
      background: #fff; border-radius: 12px; padding: 20px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;
    }
    .header h1 { font-size: 20px; color: #1a1a2e; }
    .header p { font-size: 14px; color: #888; margin-top: 4px; }
    .card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h3 { font-size: 16px; color: #333; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #888; line-height: 1.6; }

    /* ⭐ 被测试点击的按钮 — 使用 fixed 定位到指定视口坐标 */
    .summary-btn {
      position: fixed;
      top: 100px;
      left: 50px;
      padding: 10px 20px;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 2px 8px rgba(16,185,129,0.3);
      transition: background .2s, transform .15s;
    }
    .summary-btn:hover { background: #059669; transform: scale(1.04); }
    .summary-btn:active { transform: scale(0.96); }

    .badge {
      display: inline-block; font-size: 11px; background: #e0e7ff;
      color: #4a6cf7; padding: 2px 8px; border-radius: 10px; margin-left: 6px;
    }
  </style>
</head>
<body>
  <button class="summary-btn" id="open-summary-btn">📊 打开汇总窗口</button>

  <div class="header">
    <h1>仪表盘 <span class="badge">已登录</span></h1>
    <p>欢迎！点击左侧绿色按钮「打开汇总窗口」将弹出新窗口。</p>
  </div>

  <div class="card-grid">
    <div class="card">
      <h3>今日活跃用户</h3>
      <p style="font-size: 28px; color: #4a6cf7; font-weight: 700;">1,284</p>
      <p>较昨日 +12.3%</p>
    </div>
    <div class="card">
      <h3>订单总额</h3>
      <p style="font-size: 28px; color: #10b981; font-weight: 700;">¥38,420</p>
      <p>较昨日 +8.7%</p>
    </div>
    <div class="card">
      <h3>待处理工单</h3>
      <p style="font-size: 28px; color: #f59e0b; font-weight: 700;">7</p>
      <p>较昨日 -3 件</p>
    </div>
  </div>

  <script>
    document.getElementById('open-summary-btn').addEventListener('click', function() {
      var win = window.open(
        '/popup.html',
        'summaryPopup',
        'width=800,height=600,scrollbars=yes,resizable=yes,top=100,left=200'
      );
      console.log('window.open returned:', win);
      if (!win) {
        console.log('Popup was blocked!');
      }
    });
  </script>
</body>
</html>
