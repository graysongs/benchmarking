<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汇总窗口</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 32px; color: #fff;
    }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .stat-box {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      border-radius: 12px; padding: 20px;
    }
    .stat-box .label { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
    .stat-box .value { font-size: 26px; font-weight: 700; }
    .footer {
      margin-top: 24px; padding: 16px;
      background: rgba(255,255,255,0.1); border-radius: 8px;
      font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>
  <h1>📊 数据汇总</h1>
  <div class="stats">
    <div class="stat-box">
      <div class="label">总用户数</div>
      <div class="value">12,847</div>
    </div>
    <div class="stat-box">
      <div class="label">本月新增</div>
      <div class="value">+1,203</div>
    </div>
    <div class="stat-box">
      <div class="label">总收入</div>
      <div class="value">¥284,500</div>
    </div>
    <div class="stat-box">
      <div class="label">完成率</div>
      <div class="value">94.7%</div>
    </div>
  </div>
  <div class="footer">
    此窗口由自动化测试触发弹出 — This is a popup window triggered by the test.
  </div>
</body>
</html>
