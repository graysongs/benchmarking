<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试站点 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #f0f2f5;
    }
    .login-card {
      background: #fff; border-radius: 12px; padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 380px;
    }
    h1 { font-size: 22px; margin-bottom: 24px; text-align: center; color: #1a1a2e; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9;
      border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #4a6cf7; }
    button {
      width: 100%; padding: 11px; background: #4a6cf7; color: #fff;
      border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
      transition: background .2s; margin-top: 8px;
    }
    button:hover { background: #3b5de7; }
    .info { margin-top: 16px; font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>登录</h1>
    <div class="field">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" placeholder="请输入用户名" autofocus>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" placeholder="请输入密码">
    </div>
    <button type="submit" id="login-btn">登 录</button>
    <div class="info">任意用户名密码即可登录（测试用）</div>
  </div>
  <script>
    document.getElementById('login-btn').addEventListener('click', function() {
      window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
